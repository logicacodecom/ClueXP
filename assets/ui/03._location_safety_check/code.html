<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-secondary-fixed": "#00174b",
                  "on-primary-fixed": "#261a00",
                  "tertiary-fixed-dim": "#00d9fc",
                  "surface-tint": "#fbbc00",
                  "secondary-fixed-dim": "#b4c5ff",
                  "on-primary-fixed-variant": "#5c4300",
                  "on-surface-variant": "#d4c5ab",
                  "on-primary-container": "#6d5000",
                  "surface-container-low": "#1c1b1b",
                  "tertiary-container": "#04dcff",
                  "surface-variant": "#353535",
                  "primary-fixed": "#ffdfa0",
                  "error": "#ffb4ab",
                  "surface-bright": "#393939",
                  "outline": "#9c8f78",
                  "tertiary-fixed": "#aaedff",
                  "surface-container": "#20201f",
                  "on-secondary-fixed-variant": "#003ea8",
                  "surface-container-highest": "#353535",
                  "on-tertiary-fixed-variant": "#004e5c",
                  "inverse-surface": "#e5e2e1",
                  "on-secondary": "#002a78",
                  "surface-container-high": "#2a2a2a",
                  "on-error": "#690005",
                  "secondary": "#b4c5ff",
                  "surface-dim": "#131313",
                  "on-background": "#e5e2e1",
                  "tertiary": "#b4efff",
                  "error-container": "#93000a",
                  "on-error-container": "#ffdad6",
                  "secondary-container": "#0053db",
                  "inverse-primary": "#795900",
                  "on-primary": "#402d00",
                  "surface-container-lowest": "#0e0e0e",
                  "secondary-fixed": "#dbe1ff",
                  "on-tertiary-fixed": "#001f26",
                  "on-tertiary-container": "#005d6d",
                  "on-secondary-container": "#cdd7ff",
                  "on-tertiary": "#003640",
                  "outline-variant": "#504532",
                  "on-surface": "#e5e2e1",
                  "inverse-on-surface": "#313030",
                  "primary-fixed-dim": "#fbbc00",
                  "primary-container": "#ffbf00",
                  "background": "#131313",
                  "primary": "#ffe2ab",
                  "surface": "#131313"
          },
          "borderRadius": {
                  "DEFAULT": "0.125rem",
                  "lg": "0.25rem",
                  "xl": "0.5rem",
                  "full": "0.75rem"
          },
          "spacing": {
                  "unit": "4px",
                  "margin-desktop": "32px",
                  "intake-gap": "12px",
                  "fulfillment-gap": "24px",
                  "margin-mobile": "16px",
                  "gutter": "16px"
          },
          "fontFamily": {
                  "headline-sm": ["Archivo Narrow"],
                  "button-text": ["Archivo Narrow"],
                  "body-lg": ["Archivo Narrow"],
                  "display-lg": ["Archivo Narrow"],
                  "headline-md": ["Archivo Narrow"],
                  "body-md": ["Archivo Narrow"],
                  "label-caps": ["Archivo Narrow"]
          },
          "fontSize": {
                  "headline-sm": ["20px", {"lineHeight": "1.2", "fontWeight": "600"}],
                  "button-text": ["16px", {"lineHeight": "1", "fontWeight": "700"}],
                  "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}],
                  "display-lg": ["32px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                  "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],
                  "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                  "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #131313;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #333333;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar Component -->
<header class="fixed top-0 w-full z-50 bg-background border-b border-outline-variant">
<div class="flex items-center justify-between px-margin-mobile h-16 max-w-[600px] mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-[24px]" data-icon="shield">shield</span>
<div class="flex flex-col">
<span class="font-headline-md text-headline-md font-bold text-on-background tracking-tighter uppercase">ClueXP</span>
<span class="font-label-caps text-label-caps text-primary-fixed-dim uppercase tracking-widest">Emergency Access</span>
</div>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="person">person</span>
</div>
</div>
</header>
<main class="pt-20 pb-24 px-margin-mobile max-w-[600px] mx-auto flex flex-col gap-intake-gap min-h-screen">
<!-- Progress Indicator (Step 3/5) -->
<div class="flex gap-2 w-full mb-4">
<div class="h-1 flex-1 bg-primary-container"></div>
<div class="h-1 flex-1 bg-primary-container"></div>
<div class="h-1 flex-1 bg-primary-container"></div>
<div class="h-1 flex-1 bg-white/20"></div>
<div class="h-1 flex-1 bg-white/20"></div>
</div>
<!-- Narrative Section -->
<section class="mt-2">
<h1 class="font-display-lg text-display-lg text-on-background mb-2">Safety Check</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Is anyone (child or pet) currently locked inside the vehicle?</p>
</section>
<!-- Triage Options -->
<section class="grid grid-cols-1 gap-intake-gap mt-4">
<button class="flex items-center justify-between p-margin-mobile bg-surface-container border border-outline-variant hover:bg-surface-variant transition-colors group">
<div class="flex flex-col text-left">
<span class="font-headline-sm text-headline-sm text-primary">NO — I'M SAFE</span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase mt-1">Standing clear of traffic</span>
</div>
<span class="material-symbols-outlined text-primary group-active:translate-x-1 transition-transform" data-icon="check_circle">check_circle</span>
</button>
<button class="flex items-center justify-between p-margin-mobile bg-error-container/20 border border-error/50 hover:bg-error-container/30 transition-colors group">
<div class="flex flex-col text-left">
<span class="font-headline-sm text-headline-sm text-error">YES — EMERGENCY</span>
<span class="font-label-caps text-label-caps text-error/80 uppercase mt-1">Life safety priority</span>
</div>
<span class="material-symbols-outlined text-error group-active:scale-110 transition-transform" data-icon="emergency">emergency</span>
</button>
</section>
<!-- Location Section -->
<section class="mt-8 pt-8 border-t border-outline-variant flex flex-col gap-intake-gap">
<h2 class="font-headline-sm text-headline-sm text-on-background">Confirm Location</h2>
<!-- Primary Amber Location Button -->
<button class="w-full h-14 bg-primary-container text-on-primary-container font-button-text text-button-text flex items-center justify-center gap-3 active:scale-[0.98] transition-transform shadow-lg shadow-primary-container/10">
<span class="material-symbols-outlined" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
        SHARE GPS LOCATION
      </button>
<div class="relative flex items-center gap-4 py-2">
<div class="h-px grow bg-outline-variant"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">or</span>
<div class="h-px grow bg-outline-variant"></div>
</div>
<!-- Address Input -->
<div class="group">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-2 block">Manual Entry</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-2 border-outline-variant text-on-background px-4 py-4 font-body-md focus:border-primary-container focus:ring-0 transition-all outline-none" placeholder="Type address instead..." type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant" data-icon="edit_location">edit_location</span>
</div>
</div>
</section>
<!-- Atmospheric Map Card (Fulfillment Hint) -->
<div class="mt-4 grow min-h-[160px] bg-surface-container border border-outline-variant relative overflow-hidden flex items-center justify-center">
<img alt="Map interface" class="absolute inset-0 w-full h-full object-cover opacity-30 grayscale" data-alt="A dark, industrial-style map of an urban area at night, viewed from a top-down satellite perspective. The streets are thin lines of deep gray against a charcoal black background, with no colorful markers. The aesthetic is professional, technical, and high-contrast, following an emergency dashboard theme with subtle grid lines overlaid across the terrain." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBHkKhbZqoBSOUpJNrl04rwIvM-xNSZmL5aksA8MkL2kqwrhkREKPwfgUZkTFEEEu7P6Bcpyqavpj4I1PmluRyIjQZ-h_I1FLThxjKxvC0Q9Gc6QYc63_8Xu9AJNwDIkI-3CNKnyQhD7Blgv1kTQq5J0qPS7SagaOjZJsSH2MGUf2TodMoPq8RREYA4Sq37y5HiHjkWZ1wIVgxrJVxlZj_-KluIdOVrxDKBP6lWNR7nxguELdlPNiq9zsq60S-E9SBWadV9VPlWIuU"/>
<div class="relative z-10 flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-[32px]" data-icon="map">map</span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Satellite standby</span>
</div>
</div>
</main>
<!-- Emergency Footer -->
<footer class="fixed bottom-0 w-full h-[64px] z-50 bg-secondary-container flex items-center justify-center max-w-[600px] left-1/2 -translate-x-1/2 px-margin-mobile">
<button class="w-full h-full flex items-center justify-center gap-3 text-on-secondary-container font-button-text text-button-text active:scale-[0.98] transition-transform hover:brightness-110">
<span class="material-symbols-outlined" data-icon="call" style="font-variation-settings: 'FILL' 1;">call</span>
      Call a person instead
    </button>
</footer>
<script>
    // Micro-interactions for button feedback
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('touchstart', function() {
        this.classList.add('brightness-125');
      });
      btn.addEventListener('touchend', function() {
        this.classList.remove('brightness-125');
      });
    });

    // Handle Input Focus atmospheric effect
    const input = document.querySelector('input');
    const container = input.closest('.group');
    input.addEventListener('focus', () => {
      container.querySelector('label').classList.replace('text-on-surface-variant', 'text-primary-container');
    });
    input.addEventListener('blur', () => {
      container.querySelector('label').classList.replace('text-primary-container', 'text-on-surface-variant');
    });
  </script>
</body></html>
