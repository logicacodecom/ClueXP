<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ClueXP - Situation Intake</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#00174b",
                        "on-primary-fixed": "#261a00",
                        "tertiary-fixed-dim": "#00d9fc",
                        "surface-tint": "#fbbc00",
                        "secondary-fixed-dim": "#b4c5ff",
                        "on-primary-fixed-variant": "#5c4300",
                        "on-surface-variant": "#d4c5ab",
                        "on-primary-container": "#6d5000",
                        "surface-container-low": "#1c1b1b",
                        "tertiary-container": "#04dcff",
                        "surface-variant": "#353535",
                        "primary-fixed": "#ffdfa0",
                        "error": "#ffb4ab",
                        "surface-bright": "#393939",
                        "outline": "#9c8f78",
                        "tertiary-fixed": "#aaedff",
                        "surface-container": "#20201f",
                        "on-secondary-fixed-variant": "#003ea8",
                        "surface-container-highest": "#353535",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "inverse-surface": "#e5e2e1",
                        "on-secondary": "#002a78",
                        "surface-container-high": "#2a2a2a",
                        "on-error": "#690005",
                        "secondary": "#b4c5ff",
                        "surface-dim": "#131313",
                        "on-background": "#e5e2e1",
                        "tertiary": "#b4efff",
                        "error-container": "#93000a",
                        "on-error-container": "#ffdad6",
                        "secondary-container": "#0053db",
                        "inverse-primary": "#795900",
                        "on-primary": "#402d00",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary-fixed": "#dbe1ff",
                        "on-tertiary-fixed": "#001f26",
                        "on-tertiary-container": "#005d6d",
                        "on-secondary-container": "#cdd7ff",
                        "on-tertiary": "#003640",
                        "outline-variant": "#504532",
                        "on-surface": "#e5e2e1",
                        "inverse-on-surface": "#313030",
                        "primary-fixed-dim": "#fbbc00",
                        "primary-container": "#ffbf00",
                        "background": "#131313",
                        "primary": "#ffe2ab",
                        "surface": "#131313"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "margin-desktop": "32px",
                        "intake-gap": "12px",
                        "fulfillment-gap": "24px",
                        "margin-mobile": "16px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Archivo Narrow"],
                        "button-text": ["Archivo Narrow"],
                        "body-lg": ["Archivo Narrow"],
                        "display-lg": ["Archivo Narrow"],

                        "label-caps": ["Archivo Narrow"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "button-text": ["16px", {"lineHeight": "1", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "display-lg": ["32px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #0E0E0E;
            color: #e5e2e1;
            font-family: 'Archivo Narrow', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .intake-scroll-area {
            height: calc(100vh - 64px - 64px - 48px);
            overflow-y: auto;
        }
        .chip-active {
            background-color: #fbbc00;
            color: #0e0e0e;
            border-color: #fbbc00;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="dark overflow-hidden">
<!-- TopAppBar Section -->
<header class="fixed top-0 w-full z-50 bg-background border-b border-outline-variant">
<div class="flex items-center justify-between px-margin-mobile h-16 max-w-[600px] mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-[24px]">shield</span>
<div class="flex flex-col">
<h1 class="font-headline-md text-headline-md font-bold text-on-background uppercase tracking-tighter">ClueXP</h1>
<span class="font-label-caps text-label-caps text-primary uppercase">Emergency Access</span>
</div>
</div>
<div class="w-8"></div> <!-- Spacer for balance -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="max-w-[600px] mx-auto pt-20 pb-20 px-margin-mobile h-screen flex flex-col">
<!-- Progress Indicator: 6-pipe horizontal meter (Step 2 of 6) -->
<div class="flex gap-2 py-4 mb-intake-gap">
<div class="h-1 flex-1 bg-primary-container"></div>
<div class="h-1 flex-1 bg-primary-container"></div>
<div class="h-1 flex-1 bg-white/20"></div>
<div class="h-1 flex-1 bg-white/20"></div>
<div class="h-1 flex-1 bg-white/20"></div>
<div class="h-1 flex-1 bg-white/20"></div>
</div>
<!-- Narrative Section -->
<section class="mb-fulfillment-gap animate-in fade-in slide-in-from-bottom-4 duration-700">
<h2 class="font-display-lg text-display-lg text-on-background mb-2">Understood.</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">What's the situation?</p>
</section>
<!-- Intake Phase: Situation Selection -->
<section class="intake-scroll-area flex flex-col gap-intake-gap">
<button class="group w-full p-5 bg-surface-container border border-outline-variant flex items-center justify-between transition-all duration-200 active:scale-[0.98] hover:bg-surface-variant" onclick="handleSelect(this)">
<span class="font-headline-sm text-headline-sm text-on-surface group-hover:text-primary transition-colors">Locked out</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
<button class="group w-full p-5 bg-surface-container border border-outline-variant flex items-center justify-between transition-all duration-200 active:scale-[0.98] hover:bg-surface-variant" onclick="handleSelect(this)">
<span class="font-headline-sm text-headline-sm text-on-surface group-hover:text-primary transition-colors">Lost key</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
<button class="group w-full p-5 bg-surface-container border border-outline-variant flex items-center justify-between transition-all duration-200 active:scale-[0.98] hover:bg-surface-variant" onclick="handleSelect(this)">
<span class="font-headline-sm text-headline-sm text-on-surface group-hover:text-primary transition-colors">Broken key in lock</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
<button class="group w-full p-5 bg-surface-container border border-outline-variant flex items-center justify-between transition-all duration-200 active:scale-[0.98] hover:bg-surface-variant" onclick="handleSelect(this)">
<span class="font-headline-sm text-headline-sm text-on-surface group-hover:text-primary transition-colors">Keys inside</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
<button class="group w-full p-5 bg-surface-container border border-outline-variant flex items-center justify-between transition-all duration-200 active:scale-[0.98] hover:bg-surface-variant" onclick="handleSelect(this)">
<span class="font-headline-sm text-headline-sm text-on-surface group-hover:text-primary transition-colors">Lock not working</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
<button class="group w-full p-5 bg-surface-container border border-outline-variant flex items-center justify-between transition-all duration-200 active:scale-[0.98] hover:bg-surface-variant" onclick="handleSelect(this)">
<span class="font-headline-sm text-headline-sm text-on-surface group-hover:text-primary transition-colors">Rekey</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
</section>
<!-- Aesthetic Anchor: Background Industrial Element -->
<div class="mt-auto opacity-10 pointer-events-none select-none py-8 flex justify-center">
<span class="material-symbols-outlined text-[120px]" style="font-variation-settings: 'wght' 100;">lock_open</span>
</div>
</main>
<!-- Emergency Footer -->
<footer class="fixed bottom-0 w-full h-[64px] z-50 bg-secondary-container flex items-center justify-center px-margin-mobile left-1/2 -translate-x-1/2 max-w-[600px] active:scale-[0.98] transition-transform cursor-pointer hover:brightness-110">
<button class="flex items-center gap-3 font-button-text text-button-text text-on-secondary-container">
<span class="material-symbols-outlined">call</span>
            Call a person instead
        </button>
</footer>
<script>
        function handleSelect(element) {
            // Apply visual feedback
            element.classList.add('chip-active');
            
            // Interaction logic: Auto-advance simulation
            // In a real app, this would route to the next intake screen
            setTimeout(() => {
                element.style.opacity = '0';
                element.style.transform = 'translateX(20px)';
                // Optional: visual cue of advancement
                console.log('Selected:', element.querySelector('span').innerText);
            }, 150);
        }

        // Add small atmospheric flicker to primary icon on load
        window.addEventListener('DOMContentLoaded', () => {
            const shield = document.querySelector('.material-symbols-outlined');
            if (shield) {
                shield.classList.add('animate-pulse');
                setTimeout(() => shield.classList.remove('animate-pulse'), 1500);
            }
        });
    </script>
</body></html>
