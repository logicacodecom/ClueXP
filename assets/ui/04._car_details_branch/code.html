<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ClueXP - Vehicle Intake</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed": "#00174b",
                    "on-primary-fixed": "#261a00",
                    "tertiary-fixed-dim": "#00d9fc",
                    "surface-tint": "#fbbc00",
                    "secondary-fixed-dim": "#b4c5ff",
                    "on-primary-fixed-variant": "#5c4300",
                    "on-surface-variant": "#d4c5ab",
                    "on-primary-container": "#6d5000",
                    "surface-container-low": "#1c1b1b",
                    "tertiary-container": "#04dcff",
                    "surface-variant": "#353535",
                    "primary-fixed": "#ffdfa0",
                    "error": "#ffb4ab",
                    "surface-bright": "#393939",
                    "outline": "#9c8f78",
                    "tertiary-fixed": "#aaedff",
                    "surface-container": "#20201f",
                    "on-secondary-fixed-variant": "#003ea8",
                    "surface-container-highest": "#353535",
                    "on-tertiary-fixed-variant": "#004e5c",
                    "inverse-surface": "#e5e2e1",
                    "on-secondary": "#002a78",
                    "surface-container-high": "#2a2a2a",
                    "on-error": "#690005",
                    "secondary": "#b4c5ff",
                    "surface-dim": "#131313",
                    "on-background": "#e5e2e1",
                    "tertiary": "#b4efff",
                    "error-container": "#93000a",
                    "on-error-container": "#ffdad6",
                    "secondary-container": "#0053db",
                    "inverse-primary": "#795900",
                    "on-primary": "#402d00",
                    "surface-container-lowest": "#0e0e0e",
                    "secondary-fixed": "#dbe1ff",
                    "on-tertiary-fixed": "#001f26",
                    "on-tertiary-container": "#005d6d",
                    "on-secondary-container": "#cdd7ff",
                    "on-tertiary": "#003640",
                    "outline-variant": "#504532",
                    "on-surface": "#e5e2e1",
                    "inverse-on-surface": "#313030",
                    "primary-fixed-dim": "#fbbc00",
                    "primary-container": "#ffbf00",
                    "background": "#131313",
                    "primary": "#ffe2ab",
                    "surface": "#131313"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "unit": "4px",
                    "margin-desktop": "32px",
                    "intake-gap": "12px",
                    "fulfillment-gap": "24px",
                    "margin-mobile": "16px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "headline-sm": ["Archivo Narrow"],
                    "button-text": ["Archivo Narrow"],
                    "body-lg": ["Archivo Narrow"],
                    "display-lg": ["Archivo Narrow"],
                    "headline-md": ["Archivo Narrow"],
                    "body-md": ["Archivo Narrow"],
                    "label-caps": ["Archivo Narrow"]
            },
            "fontSize": {
                    "headline-sm": ["20px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "button-text": ["16px", {"lineHeight": "1", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "display-lg": ["32px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0E0E0E;
            color: #e5e2e1;
        }
        .intake-scroll-area {
            height: calc(100vh - 128px);
            overflow-y: auto;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-body-md antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background dark:bg-background border-b border-outline-variant">
<div class="flex items-center justify-between px-margin-mobile h-16 max-w-[600px] mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">shield</span>
<div class="flex flex-col">
<span class="font-headline-md text-headline-md font-bold text-on-background uppercase tracking-tighter">ClueXP</span>
<span class="font-label-caps text-label-caps text-primary-container uppercase tracking-widest">Emergency Access</span>
</div>
</div>
<button class="p-2 hover:bg-surface-variant transition-colors duration-200">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
</header>
<main class="max-w-[600px] mx-auto pt-20 pb-20 px-margin-mobile">
<!-- Progress Indicator (Step 4 of 5) -->
<div class="flex gap-1 mb-8">
<div class="h-1 flex-1 bg-primary-container"></div>
<div class="h-1 flex-1 bg-primary-container"></div>
<div class="h-1 flex-1 bg-primary-container"></div>
<div class="h-1 flex-1 bg-primary-container"></div>
<div class="h-1 flex-1 bg-white opacity-20"></div>
</div>
<!-- Narrative Section -->
<section class="mb-intake-gap">
<h1 class="font-display-lg text-display-lg mb-2">Let's identify your vehicle for the tech.</h1>
<p class="text-on-surface-variant font-body-lg text-body-lg">Identifying the key type helps us send the right cutting equipment to your location immediately.</p>
</section>
<!-- Intake Form -->
<div class="space-y-gutter">
<!-- Hero Image for Vehicle Context -->
<div class="w-full h-40 rounded bg-surface-container overflow-hidden border border-outline-variant relative">
<img class="w-full h-full object-cover grayscale opacity-60" data-alt="A cinematic, high-contrast close-up of a modern luxury car dashboard and steering wheel at night. The interior is bathed in cool blue and emergency amber ambient lighting, emphasizing an industrial-minimal aesthetic. The focus is sharp on the ignition area and steering column, reflecting a professional and urgent automotive locksmith service environment with deep blacks and rich shadows." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbV9lz9IXXVpFialQnryzySFPeHp5h5fFt1KAaGUJKEuKQRiU4lDMfs2bqw0d9E7xwTO4H9673Ir1-FAl_wxJ_fBd-giam58mQifCOgp4UHbQfYfuQSxtOG45PQCSm_mVjI27ERmA3jSZtM4tr2Ddrh3jktHneGnoIqviQ5JkwlpH4P2NyC62v7C09La-QStaOO3ZyIg6pvJinpWJWhb8QM88pquAZppcvEgKsQoNUFM4YDHOfkzVuxv-fsIquqTF83U1FWctRNwU"/>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent"></div>
</div>
<!-- Fields -->
<div class="space-y-intake-gap">
<div class="group">
<label class="block font-label-caps text-label-caps text-primary mb-1 uppercase">Vehicle Make</label>
<div class="relative">
<select class="w-full bg-surface-container-high border border-outline px-4 py-4 rounded-none appearance-none focus:border-primary-container focus:ring-0 text-on-surface font-body-lg">
<option>Select Make</option>
<option>Toyota</option>
<option>Ford</option>
<option>Honda</option>
<option>Chevrolet</option>
<option>BMW</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">arrow_drop_down</span>
</div>
</div>
<div class="grid grid-cols-2 gap-intake-gap">
<div>
<label class="block font-label-caps text-label-caps text-primary mb-1 uppercase">Model</label>
<input class="w-full bg-surface-container-high border border-outline px-4 py-4 rounded-none focus:border-primary-container focus:ring-0 text-on-surface font-body-lg" placeholder="e.g. Camry" type="text"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-primary mb-1 uppercase">Year</label>
<input class="w-full bg-surface-container-high border border-outline px-4 py-4 rounded-none focus:border-primary-container focus:ring-0 text-on-surface font-body-lg" placeholder="2024" type="number"/>
</div>
</div>
</div>
<!-- Key Type Selector (Chips) -->
<section class="pt-2">
<h3 class="font-label-caps text-label-caps text-primary mb-3 uppercase tracking-widest">Key Type</h3>
<div class="grid grid-cols-2 gap-2" id="key-type-container">
<button class="flex flex-col items-start p-4 border border-outline bg-surface-container transition-all active:scale-95 text-left" onclick="selectKey(this)">
<span class="material-symbols-outlined mb-2 text-on-surface-variant" data-icon="key">key</span>
<span class="font-button-text text-button-text">Mechanical</span>
</button>
<button class="flex flex-col items-start p-4 border border-outline bg-surface-container transition-all active:scale-95 text-left" onclick="selectKey(this)">
<span class="material-symbols-outlined mb-2 text-on-surface-variant" data-icon="settings_remote">settings_remote</span>
<span class="font-button-text text-button-text">Transponder</span>
</button>
<button class="flex flex-col items-start p-4 border border-outline bg-surface-container transition-all active:scale-95 text-left" onclick="selectKey(this)">
<span class="material-symbols-outlined mb-2 text-on-surface-variant" data-icon="contactless">contactless</span>
<span class="font-button-text text-button-text">Smart Key</span>
</button>
<button class="flex flex-col items-start p-4 border-2 border-primary-container bg-surface-container-highest transition-all active:scale-95 text-left relative overflow-hidden" onclick="selectKey(this)">
<span class="material-symbols-outlined mb-2 text-primary" data-icon="help_center">help_center</span>
<span class="font-button-text text-button-text">Not Sure</span>
<div class="absolute top-0 right-0 bg-primary-container text-on-primary-container px-2 py-0.5 font-label-caps text-[10px] uppercase">Recommended</div>
</button>
</div>
</section>
<!-- Confirm Button -->
<button class="w-full bg-primary-container text-on-primary-container py-5 rounded-none font-button-text text-button-text uppercase tracking-widest active:scale-[0.98] transition-transform hover:brightness-110 mt-8 mb-20 shadow-lg">
                Confirm Vehicle Details
            </button>
</div>
</main>
<!-- Emergency Footer -->
<footer class="fixed bottom-0 w-full h-[64px] z-50 bg-secondary-container dark:bg-secondary-container flex items-center justify-center max-w-[600px] left-1/2 -translate-x-1/2 px-margin-mobile">
<button class="flex items-center gap-2 text-on-secondary-container font-button-text text-button-text uppercase active:scale-[0.98] transition-transform hover:brightness-110">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">call</span>
            Call a person instead
        </button>
</footer>
<script>
        function selectKey(element) {
            // Remove active styles from all buttons
            const container = document.getElementById('key-type-container');
            const buttons = container.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.classList.remove('border-2', 'border-primary-container', 'bg-surface-container-highest');
                btn.classList.add('border', 'border-outline', 'bg-surface-container');
                const icon = btn.querySelector('.material-symbols-outlined');
                icon.classList.remove('text-primary');
                icon.classList.add('text-on-surface-variant');
            });

            // Add active styles to clicked button
            element.classList.remove('border', 'border-outline', 'bg-surface-container');
            element.classList.add('border-2', 'border-primary-container', 'bg-surface-container-highest');
            const activeIcon = element.querySelector('.material-symbols-outlined');
            activeIcon.classList.remove('text-on-surface-variant');
            activeIcon.classList.add('text-primary');
        }
    </script>
</body></html>
