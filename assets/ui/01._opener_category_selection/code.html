<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ClueXP - Emergency Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- Tailwind Configuration -->

                    "error": "#ffb4ab",
                    "surface-bright": "#393939",
                    "outline": "#9c8f78",
                    "tertiary-fixed": "#aaedff",
                    "surface-container": "#20201f",
                    "on-secondary-fixed-variant": "#003ea8",
                    "surface-container-highest": "#353535",
                    "on-tertiary-fixed-variant": "#004e5c",
                    "inverse-surface": "#e5e2e1",
                    "on-secondary": "#002a78",

                    "on-error": "#690005",

                    "on-secondary-container": "#cdd7ff",
                    "on-tertiary": "#003640",
                    "outline-variant": "#504532",
                    "on-surface": "#e5e2e1",
                    "inverse-on-surface": "#313030",
                    "primary-fixed-dim": "#fbbc00",

            },
            "borderRadius": {

                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "unit": "4px",
                    "margin-desktop": "32px",
                    "intake-gap": "12px",
                    "fulfillment-gap": "24px",
                    "margin-mobile": "16px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "headline-sm": ["Archivo Narrow"],

<style>
        body {
            background-color: #0e0e0e;
            color: #e5e2e1;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .card-active:active {
            background-color: #262626 !important;
            transform: scale(0.98);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-body-md antialiased overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background border-b border-outline-variant">
<div class="flex items-center justify-between px-margin-mobile h-16 max-w-[600px] mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">shield</span>
<span class="font-headline-md text-headline-md font-bold text-on-background uppercase tracking-tighter">ClueXP</span>
</div>
<div class="font-label-caps text-label-caps text-primary-container uppercase">
                Emergency Access
            </div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 px-margin-mobile max-w-[600px] mx-auto min-h-screen flex flex-col">
<!-- Progress Bar (5-segment) -->
<div class="mb-10">
<div class="flex gap-1 h-1.5 w-full">
<div class="flex-1 bg-primary-container"></div>
<div class="flex-1 bg-white/20"></div>
<div class="flex-1 bg-white/20"></div>
<div class="flex-1 bg-white/20"></div>
<div class="flex-1 bg-white/20"></div>
</div>
<div class="mt-2 font-label-caps text-label-caps text-on-surface-variant uppercase flex justify-between">
<span>Step 1 of 5</span>
<span>Category Selection</span>
</div>
</div>
<!-- Narrative Section -->
<div class="mb-intake-gap">
<h1 class="font-display-lg text-display-lg text-on-surface mb-2">
                Hello. I'm here to help you get access.
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                Where do you need help today?
            </p>
</div>
<!-- Selection Cards (Bento/Vertical Grid) -->
<div class="grid grid-cols-2 gap-4 mt-8 flex-grow">
<!-- Car -->
<button class="group flex flex-col items-center justify-center p-6 bg-surface-container-low border border-outline-variant hover:border-primary-container transition-all duration-200 card-active" onclick="handleSelection('Car')">
<div class="w-16 h-16 mb-4 flex items-center justify-center bg-surface-variant group-hover:bg-primary-container/10 transition-colors">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="directions_car">directions_car</span>
</div>
<span class="font-button-text text-button-text uppercase tracking-widest text-on-surface">Car</span>
</button>
<!-- Home -->
<button class="group flex flex-col items-center justify-center p-6 bg-surface-container-low border border-outline-variant hover:border-primary-container transition-all duration-200 card-active" onclick="handleSelection('Home')">
<div class="w-16 h-16 mb-4 flex items-center justify-center bg-surface-variant group-hover:bg-primary-container/10 transition-colors">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="home">home</span>
</div>
<span class="font-button-text text-button-text uppercase tracking-widest text-on-surface">Home</span>
</button>
<!-- Business -->
<button class="group flex flex-col items-center justify-center p-6 bg-surface-container-low border border-outline-variant hover:border-primary-container transition-all duration-200 card-active" onclick="handleSelection('Business')">
<div class="w-16 h-16 mb-4 flex items-center justify-center bg-surface-variant group-hover:bg-primary-container/10 transition-colors">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="business_center">business_center</span>
</div>
<span class="font-button-text text-button-text uppercase tracking-widest text-on-surface">Business</span>
</button>
<!-- Something Else -->
<button class="group flex flex-col items-center justify-center p-6 bg-surface-container-low border border-outline-variant hover:border-primary-container transition-all duration-200 card-active" onclick="handleSelection('Other')">
<div class="w-16 h-16 mb-4 flex items-center justify-center bg-surface-variant group-hover:bg-primary-container/10 transition-colors">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="more_horiz">more_horiz</span>
</div>
<span class="font-button-text text-button-text uppercase tracking-widest text-on-surface text-center">Something else</span>
</button>
</div>
<!-- Security/Trust Badge -->
<div class="mt-fulfillment-gap flex items-center justify-center gap-2 py-4">
<span class="material-symbols-outlined text-outline text-sm" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-caps text-label-caps text-outline uppercase">Secure Protocol Active</span>
</div>
</main>
<!-- Emergency Footer -->
<footer class="fixed bottom-0 w-full h-[64px] z-50 bg-secondary-container flex items-center justify-center max-w-[600px] left-1/2 -translate-x-1/2 transition-transform active:scale-[0.98]">
<button class="flex items-center gap-3 w-full h-full justify-center text-on-secondary-container hover:brightness-110 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">call</span>
<span class="font-button-text text-button-text uppercase">Call a person instead</span>
</button>
</footer>
<script>
        function handleSelection(category) {
            console.log('Selected:', category);
            // Simulated transition effect
            document.body.style.opacity = '0.7';
            setTimeout(() => {
                // In a real app, this would route to step 2
                document.body.style.opacity = '1';
            }, 300);
        }
    </script>
</body></html>
