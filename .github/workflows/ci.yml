name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: install monorepo dependencies
        run: npm ci
      - name: shared package typecheck
        run: npm run typecheck
      - name: build intake
        run: npm run build --workspace @cluexp/intake-web
      - name: build technician
        run: npm run build:tech
      - name: build provider
        run: npm run build:provider
      - name: build ops
        run: npm run build:ops
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: python compile
        run: uv run --with pydantic python -m compileall apps/intake-web/api apps/intake-web/scripts packages/db
      - name: schema-types drift check
        working-directory: apps/intake-web
        run: |
          uv run --with pydantic python scripts/generate_types.py
          git diff --exit-code src/types/schema.generated.ts
      - name: api unit tests (dispatch tracking contract)
        working-directory: apps/intake-web
        run: uv run --with-requirements requirements.txt --with pytest pytest api/tests -q
      - name: alembic migrations are valid (offline)
        env:
          MIGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: uv run --with alembic --with "sqlalchemy>=2" --with psycopg alembic -c packages/db/alembic.ini upgrade head --sql
